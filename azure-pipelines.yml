                  displayName: 'Validate PDFKit fonts are present'
                  workingDirectory: '$(Pipeline.Workspace)/backend'

                - task: AzureWebApp@1
                  displayName: 'Deploy to Azure Web App - DevX_Prod'
                  inputs:
                    azureSubscription: 'devxprodmanagedidentity'
                    appType: '$(appType)'
                    appName: '$(devxnousprodAppServiceName)'
                    resourceGroupName: '$(devxnousprodResourceGroup)'
                    package: '$(Pipeline.Workspace)/backend/$(Build.BuildId).zip'
                    deploymentMethod: 'auto'
                    startUpCommand: '/home/site/wwwroot/startup.sh'

                - task: AzureAppServiceManage@0
                  displayName: 'Restart Azure App Service - DevX_Prod'
                  inputs:
                    azureSubscription: 'devxprodmanagedidentity'
                    Action: 'Restart Azure App Service'
                    WebAppName: '$(devxnousprodAppServiceName)'
                    ResourceGroupName: '$(devxnousprodResourceGroup)'

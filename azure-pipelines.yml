# Azure DevOps CI/CD Pipeline - Unified Git Flow
# This pipeline implements Git Flow branching strategy:
# - feature/* → Build/Test only (no deployment), except feature/AWS-Jira-EKS-deploy → ECR + EKS Helm
# - develop → QA environment (Static Web App + App Service)
# - release/* → UAT environment (Static Web App + App Service)
# - main → PROD environment (Static Web App + App Service)
# - Insurity_DevX_Prod → Insurity PROD environment (Static Web App + App Service)
# - feature/AWS-Jira-EKS-deploy → Docker build, push to ECR, Helm upgrade on EKS (no Azure SWA/App Service)

parameters:
  - name: apiVersion
    type: string
    default: 'auto'
    displayName: 'API/App version (auto = build number; or e.g. 11.12.20)'

name: '2.0.$(Date:yyyyMMdd).$(Rev:r)'

trigger:
  branches:
    include:
      - develop
      - release/*
      - main
      - feature/*
      - Insurity_DevX_2.O
      - DevX_Prod
      - DevX_Finacs
  paths:
    include:
      - client/**
      - server/**
      - shared/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - vite.config.ts
      - tailwind.config.ts
      - postcss.config.js
      - components.json
      - staticwebapp.config.json
      - scripts/**
      - startup.sh
      - azure-pipelines.yml
      - azure-pipelines-eks.yml
      - Dockerfile
      - deploy/**
    exclude:
      - README.md
      - docs/*
      - '*.md'
      - yml_files/**

pr:
  branches:
    include:
      - develop
      - release/*
      - main
      - feature/*
      - Insurity_DevX_Prod
      - DevX_Prod
      - DevX_Finacs
  paths:
    include:
      - client/**
      - server/**
      - shared/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - vite.config.ts
      - tailwind.config.ts
      - postcss.config.js
      - components.json
      - staticwebapp.config.json
      - scripts/**
      - startup.sh
      - azure-pipelines.yml
      - azure-pipelines-eks.yml
      - Dockerfile
      - deploy/**
    exclude:
      - README.md
      - docs/*
      - '*.md'
      - yml_files/**

schedules:
  - cron: "30 21 * * *"
    displayName: "Daily Deployment at 3AM IST"
    branches:
      include:
        - develop
    always: true

pool:
  vmImage: 'ubuntu-latest'

variables:
  # Environment-specific variables (from Azure DevOps Library Variable Group)
  - group: 'DevX-Environment-Config'
  - name: nodeVersion
    value: '20.x'
  - name: azureSubscription
    value: 'devxmanagedidentity'
  - name: appType
    value: 'webAppLinux'
  - name: packageJsonDir
    value: '$(System.DefaultWorkingDirectory)'
  # Frontend feature flags (can be overridden in DevX-Environment-Config)
  - name: VITE_FEATURE_SDLC
    value: 'true'
  - name: VITE_FEATURE_QUICK_WORKFLOW
    value: 'false'
  - name: VITE_FEATURE_STACK_MODERNIZATION
    value: 'true'
  # AWS Cognito config (public frontend identifiers, not secrets)
  - name: VITE_COGNITO_USER_POOL_ID
    value: 'ap-south-1_dDAzwkcr3'
  - name: VITE_COGNITO_APP_CLIENT_ID
    value: 't3g2a9vdmjprk2ho01n1iphmd'
  - name: VITE_COGNITO_REGION
    value: 'ap-south-1'
  - name: VITE_COGNITO_DOMAIN
    value: 'devx-platform'
  - name: VITE_DEVX_HOSTING
    value: 'aws'
  - name: VITE_AUTH_MODE
    value: 'amplify'
  # QA Environment Variables
  - name: qaAppServiceName
    value: 'qadevxapi2o'
  - name: qaResourceGroup
    value: 'RG-DevXPlatform'
  - name: qaSwaToken
    value: 'REDACTED_DEPLOY_TOKEN'
  # UAT Environment Variables
  - name: uatAppServiceName
    value: 'uatdevxapi2o'
  - name: uatResourceGroup
    value: 'RG-DevXPlatform'
  - name: uatSwaToken
    value: 'REDACTED_DEPLOY_TOKEN'
  # PROD Environment Variables
  - name: prodAppServiceName
    value: 'devxapi2o'
  - name: prodResourceGroup
    value: 'RG-DevXPlatform'
  - name: prodSwaToken
    value: 'REDACTED_DEPLOY_TOKEN'
  # Insurity PROD Environment Variables
  - name: insurityProdAppServiceName
    value: 'insuritydevexapiprod2'
  - name: insurityProdResourceGroup
    value: 'RG-DevXPlatform'
  - name: insurityProdSwaToken
    value: 'REDACTED_DEPLOY_TOKEN'
  # Insurity Sandbox Environment Variables
  - name: insuritysandboxAppServiceName
    value: 'insurityapi2o'
  - name: insuritysandboxResourceGroup
    value: 'RG-DevXPlatform'
  - name: insuritysandboxSwaToken
    value: 'REDACTED_DEPLOY_TOKEN'
  # DevX_Prod(devx.nousinfo.com) Environment Variables
  - name: devxnousprodAppServiceName
    value: 'devxstudioapi'
  - name: devxnousprodResourceGroup
    value: 'RG-DevX-Studio'
  - name: devxnousprodSwaToken
    value: 'REDACTED_DEPLOY_TOKEN'
  # devxalpha Environment Variables
  - name: devxalphaAppServiceName
    value: 'devxaplha'
  - name: devxalphaResourceGroup
    value: 'RG-DevXPlatform'
  - name: devxdevxaplaSwaToken
    value: 'REDACTED_DEPLOY_TOKEN'
  # EKS (feature/AWS-Jira-EKS-deploy): secrets in DevX-Environment-Config — AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, plus AWS_SESSION_TOKEN for temporary STS keys.
  # EKS: default ALB via Ingress (EKS_INGRESS_ENABLED=true). Set false for NLB-only Service.
  # EKS job only runs helm upgrade for devx — not cluster addons (LB controller: deploy/eks/scripts).
  # Defaults match AWS console / ECS naming: cluster astra-eks, ECR devx/backend, account 860829110416 (override in UI or group if needed).
  - name: AWS_REGION
    value: 'ap-south-1'
  - name: EKS_CLUSTER_NAME
    value: 'astra-eks'
  - name: ECR_REPOSITORY_NAME
    value: 'devx/backend'
  - name: EKS_NAMESPACE
    value: 'devx'
  - name: HELM_RELEASE_NAME
    value: 'devx'
  - name: EKS_INGRESS_ENABLED
    value: 'true'
  - name: EKS_HPA_ENABLED
    value: 'false'
  - name: MYSQL_SECRET_NAME
    value: 'devx-runtime-env'
  - name: EKS_SA_ROLE_ARN
    value: 'arn:aws:iam::860829110416:role/Astra-DevX-EKS-TaskRole'
stages:
  # ============================================
  # BUILD STAGE (Common for all branches)
  # ============================================
  - stage: Build
    displayName: 'Build Application'
    jobs:
      # Fails fast if the same explicit apiVersion was already used on this branch in a prior succeeded run.
      # Requires "Allow scripts to access the OAuth token" enabled for this pipeline (classic: checkbox; YAML: Project Settings > Pipelines > Settings).
      - job: ReleaseVersionGate
        displayName: 'Validate explicit apiVersion (no duplicate on branch)'
        steps:
          - checkout: none
          - script: |
              set -euo pipefail
              if [ "${BUILD_SOURCE_BRANCH:-}" = "refs/heads/feature/AWS-Jira-EKS-deploy" ]; then
                echo "feature/AWS-Jira-EKS-deploy: skipping apiVersion duplicate gate."
                exit 0
              fi
              REQUESTED_RAW='${{ parameters.apiVersion }}'
              REQUESTED_TRIMMED="$(printf '%s' "$REQUESTED_RAW" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
              REQUESTED_LOWER="$(printf '%s' "$REQUESTED_TRIMMED" | tr '[:upper:]' '[:lower:]')"

              if [ -z "$REQUESTED_TRIMMED" ] || [ "$REQUESTED_LOWER" = "auto" ] || [ "$REQUESTED_TRIMMED" = "0.0.0" ]; then
                echo "No explicit apiVersion (empty, auto, or 0.0.0 placeholder). Skipping duplicate check; build will use Build.BuildNumber."
                exit 0
              fi

              REQUESTED="$REQUESTED_TRIMMED"
              TOKEN="$(System.AccessToken)"
              if [ -z "$TOKEN" ]; then
                echo "##vso[task.logissue type=error]System.AccessToken is empty. Enable 'Allow scripts to access the OAuth token' for this pipeline, then retry."
                exit 1
              fi

              COLLECTION_URI="$(System.TeamFoundationCollectionUri)"
              PROJECT="$(System.TeamProject)"
              DEF_ID="$(System.DefinitionId)"
              CURRENT_ID="$(Build.BuildId)"
              BRANCH="$(Build.SourceBranch)"

              BRANCH_ENC="$(printf '%s' "$BRANCH" | jq -sRr @uri)"
              LIST_URL="${COLLECTION_URI}${PROJECT}/_apis/build/builds?definitions=${DEF_ID}&branchName=${BRANCH_ENC}&statusFilter=completed&resultFilter=succeeded&queryOrder=finishTimeDescending&\$top=40&api-version=7.1"

              echo "Checking prior succeeded builds on branch $BRANCH for duplicate apiVersion=$REQUESTED ..."

              curl -sS -f -H "Authorization: Bearer ${TOKEN}" -H "Content-Type: application/json" "$LIST_URL" -o /tmp/prior_builds.json

              mapfile -t BUILD_IDS < <(jq -r '(.value // [])[] | .id' /tmp/prior_builds.json)
              for BID in "${BUILD_IDS[@]}"; do
                [ -z "$BID" ] && continue
                [ "$BID" = "$CURRENT_ID" ] && continue

                DETAIL_URL="${COLLECTION_URI}${PROJECT}/_apis/build/builds/${BID}?api-version=7.1"
                curl -sS -f -H "Authorization: Bearer ${TOKEN}" -H "Content-Type: application/json" "$DETAIL_URL" -o /tmp/one_build.json

                PREV="$(jq -r '(.templateParameters // {}) | .apiVersion // .["apiVersion"] // empty' /tmp/one_build.json 2>/dev/null || true)"
                PREV_TRIMMED="$(printf '%s' "$PREV" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"

                PREV_LOWER="$(printf '%s' "$PREV_TRIMMED" | tr '[:upper:]' '[:lower:]')"
                if [ -n "$PREV_TRIMMED" ] && [ "$PREV_LOWER" != "auto" ] && [ "$PREV_TRIMMED" != "0.0.0" ] && [ "$PREV_TRIMMED" = "$REQUESTED" ]; then
                  echo "##vso[task.logissue type=error]Duplicate apiVersion: '$REQUESTED' was already used in succeeded build #$BID on this branch. Provide a different version."
                  exit 1
                fi
              done

              echo "No duplicate apiVersion found for '$REQUESTED' on this branch."
            displayName: 'Verify apiVersion not reused (same branch)'
            env:
              SYSTEM_ACCESSTOKEN: $(System.AccessToken)
              BUILD_SOURCE_BRANCH: $(Build.SourceBranch)

      - job: BuildFrontend
        displayName: 'Build Frontend (Static Web App)'
        dependsOn: ReleaseVersionGate
        condition: ne(variables['Build.SourceBranch'], 'refs/heads/feature/AWS-Jira-EKS-deploy')
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js $(nodeVersion)'
            inputs:
              versionSpec: '$(nodeVersion)'

          - task: Cache@2
            displayName: 'Cache npm dependencies'
            inputs:
              key: 'npm | "$(Agent.OS)" | $(packageJsonDir)/package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: '$(packageJsonDir)/node_modules'

          - script: |
              npm install --no-audit
            displayName: 'npm install'
            workingDirectory: '$(packageJsonDir)'

          # Playwright browsers are optional (PDF export now uses PDFKit instead),
          # so we skip installing them in CI to avoid failures when the Playwright
          # CLI is not available.
          # - script: |
          #     npx playwright install --with-deps
          #   displayName: 'Install Playwright Browsers'
          #   workingDirectory: '$(packageJsonDir)'

          - script: |
              RAW='${{ parameters.apiVersion }}'
              TRIMMED="$(printf '%s' "$RAW" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
              LOWER="$(printf '%s' "$TRIMMED" | tr '[:upper:]' '[:lower:]')"
              if [ -n "$TRIMMED" ] && [ "$LOWER" != "auto" ] && [ "$TRIMMED" != "0.0.0" ]; then
                echo "Using manual apiVersion: $TRIMMED"
                echo "##vso[task.setvariable variable=ResolvedAppVersion]$TRIMMED"
              else
                echo "Using build number (empty, auto, or 0.0.0 placeholder apiVersion): $(Build.BuildNumber)"
                echo "##vso[task.setvariable variable=ResolvedAppVersion]$(Build.BuildNumber)"
              fi
            displayName: 'Resolve app version for build'

          # Npm@1 env does not reliably expand $(Date:ddMMyyyy); use script so build date is real DDMMYYYY.
          - script: |
              set -e
              export VITE_APP_VERSION="$(ResolvedAppVersion)"
              export VITE_BUILD_DATE=`date +%d%m%Y`
              export VITE_FEATURE_SDLC="$(VITE_FEATURE_SDLC)"
              export VITE_FEATURE_QUICK_WORKFLOW="$(VITE_FEATURE_QUICK_WORKFLOW)"
              export VITE_FEATURE_STACK_MODERNIZATION="$(VITE_FEATURE_STACK_MODERNIZATION)"
              npm run build
            displayName: 'Build Frontend'
            workingDirectory: '$(packageJsonDir)'

          - script: |
              SHORT_SHA=$(echo $(Build.SourceVersion) | cut -c1-8)
              BUILD_DATE=$(date +%Y%m%d)
              echo "##vso[build.addbuildtag]app-version-$(ResolvedAppVersion)"
              echo "##vso[build.addbuildtag]build-date-$BUILD_DATE"
              echo "##vso[build.addbuildtag]commit-$SHORT_SHA"
              echo "Resolved commit: $SHORT_SHA"
              echo "Resolved build date: $BUILD_DATE"
            displayName: 'Add build metadata tags'
            workingDirectory: '$(packageJsonDir)'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Frontend Artifacts'
            inputs:
              PathtoPublish: '$(packageJsonDir)/dist/public'
              ArtifactName: 'frontend'
              publishLocation: 'Container'

      - job: BuildBackend
        displayName: 'Build Backend (App Service)'
        dependsOn: ReleaseVersionGate
        condition: ne(variables['Build.SourceBranch'], 'refs/heads/feature/AWS-Jira-EKS-deploy')
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js $(nodeVersion)'
            inputs:
              versionSpec: '$(nodeVersion)'

          - task: Cache@2
            displayName: 'Cache npm dependencies'
            inputs:
              key: 'npm | "$(Agent.OS)" | $(packageJsonDir)/package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: '$(packageJsonDir)/node_modules'

          - script: |
              npm install --no-audit
            displayName: 'npm install'
            workingDirectory: '$(packageJsonDir)'

          # Playwright browsers are optional (PDF export now uses PDFKit instead),
          # so we skip installing them in CI to avoid failures when the Playwright
          # CLI is not available.
          # - script: |
          #     npx playwright install --with-deps
          #   displayName: 'Install Playwright Browsers'
          #   workingDirectory: '$(packageJsonDir)'

          - script: |
              echo "Checking migration file locations..."
              npm run check:migration-location
            displayName: 'Check Migration Locations'
            workingDirectory: '$(packageJsonDir)'

          - script: |
              echo "Running TypeScript check..."
              npm run check || echo "TypeScript check completed with warnings/errors - continuing build"
            displayName: 'TypeScript check (optional)'
            workingDirectory: '$(packageJsonDir)'
            continueOnError: true

          - task: Npm@1
            displayName: 'npm run build'
            inputs:
              command: 'custom'
              workingDir: '$(packageJsonDir)'
              customCommand: 'run build'

          - task: CopyFiles@2
            displayName: 'Copy files for deployment'
            inputs:
              SourceFolder: '$(packageJsonDir)'
              Contents: |
                dist/**
                server/assets/fonts/**
                startup.sh
                .deployment
              TargetFolder: '$(Build.ArtifactStagingDirectory)/deploy'
              CleanTargetFolder: true

          - script: |
              node scripts/generate-runtime-package.cjs $(Build.ArtifactStagingDirectory)/deploy
            displayName: 'Generate backend runtime package'
            workingDirectory: '$(packageJsonDir)'

          - script: |
              cd $(Build.ArtifactStagingDirectory)/deploy
              npm install --package-lock-only --omit=dev --no-audit
              npm ci --omit=dev --no-audit
            displayName: 'Install backend runtime dependencies'
            env:
              PUPPETEER_SKIP_DOWNLOAD: 'true'

          - script: |
              chmod +x $(Build.ArtifactStagingDirectory)/deploy/startup.sh
            displayName: 'Make startup.sh executable'

          - script: |
              echo "🔎 Validating PDF fonts exist in artifact..."
              ls -lh $(Build.ArtifactStagingDirectory)/deploy/server/assets/fonts
              test -f $(Build.ArtifactStagingDirectory)/deploy/server/assets/fonts/LiberationSans-Regular.ttf || (echo "❌ LiberationSans-Regular.ttf not found" && exit 1)
              echo "✅ PDF fonts validation passed"
            displayName: 'Validate PDFKit fonts are present'

          - task: ArchiveFiles@2
            displayName: 'Archive application files'
            inputs:
              rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/deploy'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
              replaceExistingArchive: true
              compressionLevel: 'fastest'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Backend Artifacts'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
              ArtifactName: 'backend'
              publishLocation: 'Container'

      - job: EksBranchPrDockerBuild
        displayName: 'EKS branch — Docker build only (PR validation)'
        dependsOn: ReleaseVersionGate
        condition: |
          and(
            succeeded(),
            eq(variables['Build.SourceBranch'], 'refs/heads/feature/AWS-Jira-EKS-deploy'),
            eq(variables['Build.Reason'], 'PullRequest')
          )
        steps:
          - checkout: self
          - script: |
              set -euo pipefail
              npm run check:lockfile
            displayName: 'Validate package-lock.json sync'
          - script: |
              set -euo pipefail
              docker version
              docker build -t "devx:pr-$(Build.BuildId)" -f Dockerfile .
              echo "Docker image build succeeded (not pushed)."
            displayName: 'docker build'

      - job: EksBuildPushHelm
        displayName: 'EKS — Docker push to ECR and Helm upgrade'
        dependsOn: ReleaseVersionGate
        condition: |
          and(
            succeeded(),
            eq(variables['Build.SourceBranch'], 'refs/heads/feature/AWS-Jira-EKS-deploy'),
            ne(variables['Build.Reason'], 'PullRequest')
          )
        steps:
          - checkout: self
          - script: |
              set -euo pipefail
              npm run check:lockfile
            displayName: 'Validate package-lock.json sync'
          - script: |
              set -euo pipefail
              curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
              helm version
            displayName: 'Install Helm 3'
          - script: |
              set -euo pipefail
              if [ "${AWS_SESSION_TOKEN:-}" = '$(AWS_SESSION_TOKEN)' ]; then
                unset AWS_SESSION_TOKEN
              fi
              if [[ "${AWS_ACCESS_KEY_ID:-}" == ASIA* && -z "${AWS_SESSION_TOKEN:-}" ]]; then
                echo "##vso[task.logissue type=error]AWS_ACCESS_KEY_ID is a temporary STS key, but AWS_SESSION_TOKEN is not set in DevX-Environment-Config."
                exit 1
              fi
              REGION="${AWS_REGION}"
              REPO="${ECR_REPOSITORY_NAME:?ECR_REPOSITORY_NAME is not set in DevX-Environment-Config}"
              CLUSTER="${EKS_CLUSTER_NAME:?EKS_CLUSTER_NAME is not set in DevX-Environment-Config}"
              NS="${EKS_NAMESPACE}"
              REL="${HELM_RELEASE_NAME}"
              TAG="${BUILD_BUILDID}"
              ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
              REGISTRY="${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com"
              IMAGE="${REGISTRY}/${REPO}:${TAG}"

              echo "Logging in to ECR..."
              aws ecr get-login-password --region "${REGION}" | docker login --username AWS --password-stdin "${REGISTRY}"

              echo "Building ${IMAGE}"
              docker build --progress=plain -t "${IMAGE}" -f Dockerfile . \
                --build-arg "VITE_DEVX_HOSTING=${VITE_DEVX_HOSTING}" \
                --build-arg "VITE_AUTH_MODE=${VITE_AUTH_MODE}" \
                --build-arg "VITE_COGNITO_USER_POOL_ID=${VITE_COGNITO_USER_POOL_ID}" \
                --build-arg "VITE_COGNITO_APP_CLIENT_ID=${VITE_COGNITO_APP_CLIENT_ID}" \
                --build-arg "VITE_COGNITO_REGION=${VITE_COGNITO_REGION}" \
                --build-arg "VITE_COGNITO_DOMAIN=${VITE_COGNITO_DOMAIN}" \
                --build-arg "VITE_FEATURE_SDLC=${VITE_FEATURE_SDLC}" \
                --build-arg "VITE_FEATURE_QUICK_WORKFLOW=${VITE_FEATURE_QUICK_WORKFLOW}" \
                --build-arg "VITE_FEATURE_STACK_MODERNIZATION=${VITE_FEATURE_STACK_MODERNIZATION}"

              echo "Pushing ${IMAGE}"
              docker push "${IMAGE}"

              echo "Configuring kubectl for EKS..."
              aws eks update-kubeconfig --name "${CLUSTER}" --region "${REGION}"

              CHART_DIR="${SYSTEM_DEFAULTWORKINGDIRECTORY}/deploy/eks/helm/devx"
              test -d "${CHART_DIR}" || { echo "##vso[task.logissue type=error]Helm chart not found at ${CHART_DIR}"; exit 1; }

              echo "Helm upgrade --install ${REL} (namespace ${NS})"
              HELM_SETS=( )
              HELM_SETS+=( --set "image.repository=${REGISTRY}/${REPO}" )
              HELM_SETS+=( --set "image.tag=${TAG}" )
              if [ -n "${MYSQL_SECRET_NAME:-}" ]; then
                HELM_SETS+=( --set "mysql.existingSecret=${MYSQL_SECRET_NAME}" )
              fi
              HELM_SETS+=( --set "env.devxHosting=aws" )
              HELM_SETS+=( --set "env.awsRegion=${AWS_REGION}" )
              HELM_SETS+=( --set "serviceAccount.name=devx" )
              HELM_SETS+=( --set "serviceAccount.create=false" )
              if [ "${EKS_INGRESS_ENABLED:-true}" = "true" ]; then
                HELM_SETS+=( --set "ingress.enabled=true" )
              else
                HELM_SETS+=( --set "ingress.enabled=false" )
              fi
              if [ "${EKS_HPA_ENABLED:-false}" = "true" ]; then
                HELM_SETS+=( --set "autoscaling.enabled=true" )
              fi
              set +e
              helm upgrade --install "${REL}" "${CHART_DIR}" \
                --namespace "${NS}" \
                --create-namespace \
                "${HELM_SETS[@]}" \
                --wait --timeout 25m
              HELM_RC=$?
              set -e
              if [ "${HELM_RC}" -ne 0 ]; then
                echo "##vso[task.logissue type=warning]Helm wait returned ${HELM_RC} — checking rollout anyway"
                kubectl get pods,svc,events -n "${NS}" --sort-by='.lastTimestamp' | tail -80 || true
              fi

              echo "--- Post-deploy verification ---"
              kubectl rollout status "deployment/${REL}" -n "${NS}" --timeout=10m
              kubectl get deployment "${REL}" -n "${NS}" -o jsonpath='SA={.spec.template.spec.serviceAccountName}{"\n"}'
              kubectl set env "deployment/${REL}" -n "${NS}" --list 2>/dev/null | grep -E 'DEVX_HOSTING|AWS_SECRET_NAME' || true
              kubectl get pods,svc,ingress,hpa,pdb -n "${NS}" -o wide 2>/dev/null || kubectl get pods,svc -n "${NS}" -o wide
              if [ "${EKS_INGRESS_ENABLED:-true}" = "true" ]; then
                echo "--- Ingress ALB hostname (CloudFront origin when ADDRESS is set) ---"
                kubectl get ingress "${REL}" -n "${NS}" -o jsonpath='{.status.loadBalancer.ingress[0].hostname}{"\n"}' 2>/dev/null || true
                kubectl describe ingress "${REL}" -n "${NS}" 2>/dev/null | tail -25 || true
              fi
            displayName: 'ECR login, build, push, helm upgrade'
            env:
              AWS_ACCESS_KEY_ID: $(AWS_ACCESS_KEY_ID)
              AWS_SECRET_ACCESS_KEY: $(AWS_SECRET_ACCESS_KEY)
              AWS_SESSION_TOKEN: $(AWS_SESSION_TOKEN)
              AWS_REGION: $(AWS_REGION)
              AWS_DEFAULT_REGION: $(AWS_REGION)
              ECR_REPOSITORY_NAME: $(ECR_REPOSITORY_NAME)
              EKS_CLUSTER_NAME: $(EKS_CLUSTER_NAME)
              EKS_NAMESPACE: $(EKS_NAMESPACE)
              HELM_RELEASE_NAME: $(HELM_RELEASE_NAME)
              BUILD_BUILDID: $(Build.BuildId)
              SYSTEM_DEFAULTWORKINGDIRECTORY: $(System.DefaultWorkingDirectory)
              MYSQL_SECRET_NAME: $(MYSQL_SECRET_NAME)
              EKS_SA_ROLE_ARN: $(EKS_SA_ROLE_ARN)
              EKS_INGRESS_ENABLED: $(EKS_INGRESS_ENABLED)
              EKS_HPA_ENABLED: $(EKS_HPA_ENABLED)
              VITE_DEVX_HOSTING: $(VITE_DEVX_HOSTING)
              VITE_AUTH_MODE: $(VITE_AUTH_MODE)
              VITE_COGNITO_USER_POOL_ID: $(VITE_COGNITO_USER_POOL_ID)
              VITE_COGNITO_APP_CLIENT_ID: $(VITE_COGNITO_APP_CLIENT_ID)
              VITE_COGNITO_REGION: $(VITE_COGNITO_REGION)
              VITE_COGNITO_DOMAIN: $(VITE_COGNITO_DOMAIN)
              VITE_FEATURE_SDLC: $(VITE_FEATURE_SDLC)
              VITE_FEATURE_QUICK_WORKFLOW: $(VITE_FEATURE_QUICK_WORKFLOW)
              VITE_FEATURE_STACK_MODERNIZATION: $(VITE_FEATURE_STACK_MODERNIZATION)

    # ============================================
    # QA DEPLOYMENT (develop branch)
  # ============================================
  - stage: Deploy_QA
    displayName: 'Deploy to QA Environment'
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployFrontendQA
        displayName: 'Deploy Frontend to QA (Static Web App)'
        environment: 'qa-frontend'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@0
                  displayName: 'Download Frontend Artifacts'
                  inputs:
                    buildType: 'current'
                    downloadType: 'specific'
                    artifactName: 'frontend'
                    downloadPath: '$(Pipeline.Workspace)'
                
                - script: |
                    # Copy files to repository root - AzureStaticWebApp with skip_app_build looks in root by default
                    if [ -f "$(Pipeline.Workspace)/frontend/index.html" ]; then
                      echo "Copying files from frontend root to repo root"
                      cp -r $(Pipeline.Workspace)/frontend/* .
                    elif [ -d "$(Pipeline.Workspace)/frontend/dist/public" ] && [ -f "$(Pipeline.Workspace)/frontend/dist/public/index.html" ]; then
                      echo "Copying files from frontend/dist/public to repo root"
                      cp -r $(Pipeline.Workspace)/frontend/dist/public/* .
                    else
                      echo "ERROR: Could not find index.html"
                      find $(Pipeline.Workspace)/frontend -type f | head -10
                      exit 1
                    fi
                    # Ensure staticwebapp.config.json is present (critical for SPA routing)
                    if [ ! -f "staticwebapp.config.json" ]; then
                      echo "WARNING: staticwebapp.config.json not found, copying from repo root"
                      cp staticwebapp.config.json . 2>/dev/null || echo "ERROR: staticwebapp.config.json not found in repo either"
                    fi
                    test -f index.html && echo "✓ index.html found" || exit 1
                    test -f staticwebapp.config.json && echo "✓ staticwebapp.config.json found" || exit 1
                  displayName: 'Prepare Static Web App Files'
                  workingDirectory: '$(System.DefaultWorkingDirectory)'
                
                - task: AzureStaticWebApp@0
                  displayName: 'Deploy Static Web App to QA'
                  inputs:
                    azure_static_web_apps_api_token: '$(qaSwaToken)'
                    app_location: '/'
                    api_location: ''
                    output_location: '/'
                    skip_app_build: true

      - deployment: DeployBackendQA
        displayName: 'Deploy Backend to QA (App Service)'
        environment: 'qa-backend'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@0
                  displayName: 'Download Backend Artifacts'
                  inputs:
                    buildType: 'current'
                    downloadType: 'specific'
                    artifactName: 'backend'
                    downloadPath: '$(Pipeline.Workspace)'

                - script: |
                    echo "🔎 Validating PDF fonts exist in artifact..."
                    ls -lh $(Pipeline.Workspace)/backend/$(Build.BuildId).zip
                    unzip -l $(Pipeline.Workspace)/backend/$(Build.BuildId).zip | grep -i "server/assets/fonts"
                    unzip -t $(Pipeline.Workspace)/backend/$(Build.BuildId).zip 'server/assets/fonts/LiberationSans-Regular.ttf' > /dev/null 2>&1 || (echo "❌ LiberationSans-Regular.ttf not found in archive" && exit 1)
                    echo "✅ PDF fonts validation passed"
                  displayName: 'Validate PDFKit fonts are present'
                  workingDirectory: '$(Pipeline.Workspace)/backend'

                - task: AzureAppServiceSettings@1
                  displayName: 'Configure QA App Service package deployment settings'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    appName: '$(qaAppServiceName)'
                    resourceGroupName: '$(qaResourceGroup)'
                    appSettings: |
                      [
                        {
                          "name": "WEBSITE_RUN_FROM_PACKAGE",
                          "value": "1",
                          "slotSetting": false
                        },
                        {
                          "name": "SCM_DO_BUILD_DURING_DEPLOYMENT",
                          "value": "false",
                          "slotSetting": false
                        },
                        {
                          "name": "WEBSITES_CONTAINER_START_TIME_LIMIT",
                          "value": "900",
                          "slotSetting": false
                        },
                        {
                          "name": "WEBSITE_WARMUP_PATH",
                          "value": "/healthz",
                          "slotSetting": false
                        },
                        {
                          "name": "WEBSITE_WARMUP_STATUSES",
                          "value": "200",
                          "slotSetting": false
                        }
                      ]

                - task: AzureCLI@2
                  displayName: 'Enable QA App Service container logging'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      az webapp log config \
                        --resource-group "$(qaResourceGroup)" \
                        --name "$(qaAppServiceName)" \
                        --docker-container-logging filesystem \
                        --level information

                - task: AzureAppServiceManage@0
                  displayName: 'Stop Azure App Service - QA before deploy'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    Action: 'Stop Azure App Service'
                    WebAppName: '$(qaAppServiceName)'
                    ResourceGroupName: '$(qaResourceGroup)'

                - task: AzureCLI@2
                  displayName: 'Clean old QA package deployments before deploy'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      set +e
                      echo "Cleaning inactive SitePackages for $(qaAppServiceName)..."
                      creds_json="$(az webapp deployment list-publishing-credentials --resource-group "$(qaResourceGroup)" --name "$(qaAppServiceName)" -o json)"
                      user="$(echo "$creds_json" | jq -r '.publishingUserName')"
                      pass="$(echo "$creds_json" | jq -r '.publishingPassword')"
                      scm_host="$(az webapp show --resource-group "$(qaResourceGroup)" --name "$(qaAppServiceName)" --query "enabledHostNames[?contains(@, '.scm.')][0]" -o tsv)"
                      if [ -z "$scm_host" ] || [ "$scm_host" = "null" ]; then
                        scm_host="$(qaAppServiceName).scm.azurewebsites.net"
                      fi
                      scm_base="https://${scm_host}"
                      cleanup_command='cd /home/data/SitePackages 2>/dev/null || exit 0; active=""; [ -f packagename.txt ] && active="$(cat packagename.txt | tr -d "\r\n")"; echo "Active package: ${active:-none}"; echo "Before cleanup:"; du -sh /home/data/SitePackages 2>/dev/null; ls -lh /home/data/SitePackages 2>/dev/null | tail -20; find /home/data/SitePackages -maxdepth 1 -type f -name "*.zip" ! -name "$active" -delete; echo "After cleanup:"; du -sh /home/data/SitePackages 2>/dev/null; df -h /home'
                      curl -fsS -u "$user:$pass" "${scm_base}/api/command" \
                        -H "Content-Type: application/json" \
                        -d "$(jq -n --arg command "$cleanup_command" '{command:$command}')"
                      exit 0

                - task: AzureWebApp@1
                  displayName: 'Deploy to Azure Web App - QA'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    appType: '$(appType)'
                    appName: '$(qaAppServiceName)'
                    resourceGroupName: '$(qaResourceGroup)'
                    package: '$(Pipeline.Workspace)/backend/$(Build.BuildId).zip'
                    deploymentMethod: 'runFromPackage'
                    appSettings: '-WEBSITE_RUN_FROM_PACKAGE 1 -SCM_DO_BUILD_DURING_DEPLOYMENT false -WEBSITES_CONTAINER_START_TIME_LIMIT 900 -WEBSITE_WARMUP_PATH /healthz -WEBSITE_WARMUP_STATUSES 200'
                    startUpCommand: 'bash /home/site/wwwroot/startup.sh'

                - task: AzureCLI@2
                  displayName: 'Dump QA Kudu deployment logs on failure'
                  condition: failed()
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      set +e
                      echo "Fetching Kudu deployment diagnostics for $(qaAppServiceName)..."
                      creds_json="$(az webapp deployment list-publishing-credentials --resource-group "$(qaResourceGroup)" --name "$(qaAppServiceName)" -o json)"
                      user="$(echo "$creds_json" | jq -r '.publishingUserName')"
                      pass="$(echo "$creds_json" | jq -r '.publishingPassword')"
                      scm_host="$(az webapp show --resource-group "$(qaResourceGroup)" --name "$(qaAppServiceName)" --query "enabledHostNames[?contains(@, '.scm.')][0]" -o tsv)"
                      if [ -z "$scm_host" ] || [ "$scm_host" = "null" ]; then
                        scm_host="$(qaAppServiceName).scm.azurewebsites.net"
                      fi
                      scm_base="https://${scm_host}"
                      echo "Kudu host: ${scm_host}"
                      echo "Latest deployments:"
                      curl -fsS -u "$user:$pass" "${scm_base}/api/deployments" | jq '.[0:3] | map({id, status, status_text, message, received_time, end_time})'
                      latest_id="$(curl -fsS -u "$user:$pass" "${scm_base}/api/deployments" | jq -r '.[0].id // empty')"
                      if [ -n "$latest_id" ]; then
                        echo "Latest deployment log: ${latest_id}"
                        curl -fsS -u "$user:$pass" "${scm_base}/api/deployments/${latest_id}/log" | jq '.'
                      fi
                      echo "Recent Kudu trace files:"
                      curl -fsS -u "$user:$pass" "${scm_base}/api/vfs/LogFiles/kudu/trace/" | jq '.[-5:] | map({name, size, mtime})'
                      echo "Disk usage:"
                      curl -fsS -u "$user:$pass" "${scm_base}/api/command" \
                        -H "Content-Type: application/json" \
                        -d '{"command":"du -sh /home/site/wwwroot /home/data/SitePackages 2>/dev/null; df -h /home"}'
                      exit 0

                - task: AzureCLI@2
                  displayName: 'Start Azure App Service - QA'
                  condition: always()
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      set +e
                      for attempt in $(seq 1 12); do
                        echo "Starting $(qaAppServiceName), attempt ${attempt}/12..."
                        az webapp start \
                          --resource-group "$(qaResourceGroup)" \
                          --name "$(qaAppServiceName)"
                        rc=$?
                        state="$(az webapp show --resource-group "$(qaResourceGroup)" --name "$(qaAppServiceName)" --query state -o tsv 2>/dev/null)"
                        echo "Current state: ${state:-unknown}"
                        if [ "$rc" -eq 0 ]; then
                          exit 0
                        fi
                        echo "Start attempt failed, waiting 30 seconds before retry..."
                        sleep 30
                      done
                      echo "App Service did not start after retries."
                      exit 1

                - task: AzureCLI@2
                  displayName: 'Dump QA container startup logs on failure'
                  condition: failed()
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      set +e
                      echo "Fetching container startup diagnostics for $(qaAppServiceName)..."
                      az webapp show \
                        --resource-group "$(qaResourceGroup)" \
                        --name "$(qaAppServiceName)" \
                        --query "{state:state, enabledHostNames:enabledHostNames, siteConfig:siteConfig.appCommandLine}" \
                        -o json
                      az webapp config appsettings list \
                        --resource-group "$(qaResourceGroup)" \
                        --name "$(qaAppServiceName)" \
                        --query "[?name=='PORT' || name=='WEBSITES_PORT' || name=='WEBSITE_RUN_FROM_PACKAGE' || name=='WEBSITES_CONTAINER_START_TIME_LIMIT' || name=='WEBSITE_WARMUP_PATH' || name=='WEBSITE_WARMUP_STATUSES' || name=='SCM_DO_BUILD_DURING_DEPLOYMENT'].{name:name,value:value}" \
                        -o table
                      creds_json="$(az webapp deployment list-publishing-credentials --resource-group "$(qaResourceGroup)" --name "$(qaAppServiceName)" -o json)"
                      user="$(echo "$creds_json" | jq -r '.publishingUserName')"
                      pass="$(echo "$creds_json" | jq -r '.publishingPassword')"
                      scm_host="$(az webapp show --resource-group "$(qaResourceGroup)" --name "$(qaAppServiceName)" --query "enabledHostNames[?contains(@, '.scm.')][0]" -o tsv)"
                      if [ -z "$scm_host" ] || [ "$scm_host" = "null" ]; then
                        scm_host="$(qaAppServiceName).scm.azurewebsites.net"
                      fi
                      scm_base="https://${scm_host}"
                      log_command='echo "Log files:"; find /home/LogFiles -maxdepth 3 -type f 2>/dev/null | sort | tail -50; echo "Recent container logs:"; for f in $(find /home/LogFiles -maxdepth 3 -type f 2>/dev/null | sort | tail -10); do echo "===== ${f}"; tail -200 "${f}" 2>/dev/null; done'
                      curl -fsS -u "$user:$pass" "${scm_base}/api/command" \
                        -H "Content-Type: application/json" \
                        -d "$(jq -n --arg command "$log_command" '{command:$command}')"
                      exit 0

  # ============================================
  # UAT DEPLOYMENT (release/* branches)
  # ============================================
  - stage: Deploy_UAT
    displayName: 'Deploy to UAT Environment'
    dependsOn: Build
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/heads/release/'))
    jobs:
      - deployment: DeployFrontendUAT
        displayName: 'Deploy Frontend to UAT (Static Web App)'
        environment: 'uat-frontend'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@0
                  displayName: 'Download Frontend Artifacts'
                  inputs:
                    buildType: 'current'
                    downloadType: 'specific'
                    artifactName: 'frontend'
                    downloadPath: '$(Pipeline.Workspace)'
                
                - script: |
                    echo "=== Debug: Checking artifact structure ==="
                    echo "Pipeline.Workspace: $(Pipeline.Workspace)"
                    echo "System.DefaultWorkingDirectory: $(System.DefaultWorkingDirectory)"
                    echo "Listing frontend artifact:"
                    ls -la $(Pipeline.Workspace)/frontend/ 2>&1 || echo "Frontend folder not found"
                    echo ""
                    echo "Searching for index.html:"
                    find $(Pipeline.Workspace) -name "index.html" -type f 2>&1 || echo "index.html not found"
                    echo ""
                    echo "Checking dist/public subdirectory:"
                    ls -la $(Pipeline.Workspace)/frontend/dist/public/ 2>&1 || echo "No dist/public subdirectory"
                  displayName: 'Debug: Check Artifact Structure'
                
                - script: |
                    # Copy files to repository root - AzureStaticWebApp with skip_app_build looks in root by default
                    # Handle both cases: files directly in frontend or in frontend/dist/public
                    if [ -f "$(Pipeline.Workspace)/frontend/index.html" ]; then
                      echo "Copying files from frontend root to repo root"
                      cp -r $(Pipeline.Workspace)/frontend/* .
                    elif [ -d "$(Pipeline.Workspace)/frontend/dist/public" ] && [ -f "$(Pipeline.Workspace)/frontend/dist/public/index.html" ]; then
                      echo "Copying files from frontend/dist/public to repo root"
                      cp -r $(Pipeline.Workspace)/frontend/dist/public/* .
                    else
                      echo "ERROR: Could not find index.html"
                      echo "Checking what's actually in frontend:"
                      find $(Pipeline.Workspace)/frontend -type f | head -10
                      exit 1
                    fi
                    # Ensure staticwebapp.config.json is present (critical for SPA routing)
                    if [ ! -f "staticwebapp.config.json" ]; then
                      echo "WARNING: staticwebapp.config.json not found, copying from repo root"
                      cp staticwebapp.config.json . 2>/dev/null || echo "ERROR: staticwebapp.config.json not found in repo either"
                    fi
                    echo "Files in repo root:"
                    ls -la | grep -E "(index.html|staticwebapp.config.json|assets)" | head -10
                    echo "Verifying required files exist:"
                    test -f index.html && echo "✓ index.html found" || (echo "✗ index.html NOT found" && exit 1)
                    test -f staticwebapp.config.json && echo "✓ staticwebapp.config.json found" || (echo "✗ staticwebapp.config.json NOT found" && exit 1)
                    pwd
                  displayName: 'Prepare Static Web App Files'
                  workingDirectory: '$(System.DefaultWorkingDirectory)'
                
                - task: AzureStaticWebApp@0
                  displayName: 'Deploy Static Web App to UAT'
                  inputs:
                    azure_static_web_apps_api_token: '$(uatSwaToken)'
                    app_location: '/'
                    api_location: ''
                    output_location: '/'
                    skip_app_build: true

      - deployment: DeployBackendUAT
        displayName: 'Deploy Backend to UAT (App Service)'
        environment: 'uat-backend'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadBuildArtifacts@0
                  displayName: 'Download Backend Artifacts'
                  inputs:
                    buildType: 'current'
                    downloadType: 'specific'
                    artifactName: 'backend'
                    downloadPath: '$(Pipeline.Workspace)'

                - script: |
                    echo "🔎 Validating PDF fonts exist in artifact..."
                    unzip -l $(Pipeline.Workspace)/backend/$(Build.BuildId).zip | grep -i "server/assets/fonts"
                    unzip -t $(Pipeline.Workspace)/backend/$(Build.BuildId).zip 'server/assets/fonts/LiberationSans-Regular.ttf' > /dev/null 2>&1 || (echo "❌ LiberationSans-Regular.ttf not found in archive" && exit 1)
                    echo "✅ PDF fonts validation passed"
                  displayName: 'Validate PDFKit fonts are present'
                  workingDirectory: '$(Pipeline.Workspace)/backend'

                - task: AzureWebApp@1
                  displayName: 'Deploy to Azure Web App - UAT'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    appType: '$(appType)'
                    appName: '$(uatAppServiceName)'
                    resourceGroupName: '$(uatResourceGroup)'
                    package: '$(Pipeline.Workspace)/backend/$(Build.BuildId).zip'
                    deploymentMethod: 'auto'
                    startUpCommand: '/home/site/wwwroot/startup.sh'

                - task: AzureAppServiceManage@0
                  displayName: 'Restart Azure App Service - UAT'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    Action: 'Restart Azure App Service'
                    WebAppName: '$(uatAppServiceName)'
                    ResourceGroupName: '$(uatResourceGroup)'


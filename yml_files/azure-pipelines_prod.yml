# Azure DevOp CI/CD Pipeline for DevX Backend
# This pipeline builds and deploys the backend application to Azure Web App (Linux)

trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - server/**
      - shared/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - vite.config.ts
      - scripts/**
      - azure-pipelines.yml
      - startup.sh
      - .env.example
    exclude:
      - client/**
      - README.md
      - docs/*
      - '*.md'

pr:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - server/**
      - shared/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - vite.config.ts
      - scripts/**
      - azure-pipelines.yml
      - startup.sh
      - .env.example
    exclude:
      - client/**
      - README.md
      - docs/*
      - '*.md'

pool:
  vmImage: 'ubuntu-latest'

variables:
  nodeVersion: '20.x'
  azureSubscription: 'devxmanagedidentity'
  appType: 'webAppLinux'
  appName: 'devxapi2o'
  resourceGroupName: 'RG-DevXPlatform'
  packageJsonDir: '$(System.DefaultWorkingDirectory)'

stages:
  - stage: Build
    displayName: 'Build Application'
    jobs:
      - job: BuildJob
        displayName: 'Build and Test'
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js $(nodeVersion)'
            inputs:
              versionSpec: '$(nodeVersion)'

          - task: Npm@1
            displayName: 'npm install'
            inputs:
              command: 'install'
              workingDir: '$(packageJsonDir)'

          - script: |
              echo "Running TypeScript check..."
              npm run check || echo "TypeScript check completed with warnings/errors - continuing build"
            displayName: 'TypeScript check (optional)'
            workingDirectory: '$(packageJsonDir)'
            continueOnError: true

          - task: Npm@1
            displayName: 'npm run build'
            inputs:
              command: 'custom'
              workingDir: '$(packageJsonDir)'
              customCommand: 'run build'

          - task: Npm@1
            displayName: 'npm install --production (for deployment)'
            inputs:
              command: 'ci'
              workingDir: '$(packageJsonDir)'
              arguments: '--production --prefer-offline --no-audit'

          - task: CopyFiles@2
            displayName: 'Copy files for deployment'
            inputs:
              SourceFolder: '$(packageJsonDir)'
              Contents: |
                dist/**
                package.json
                package-lock.json
                startup.sh
                node_modules/**
              TargetFolder: '$(Build.ArtifactStagingDirectory)/deploy'
              CleanTargetFolder: true

          - script: |
              chmod +x $(Build.ArtifactStagingDirectory)/deploy/startup.sh
            displayName: 'Make startup.sh executable'

          - task: ArchiveFiles@2
            displayName: 'Archive application files'
            inputs:
              rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/deploy'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
              replaceExistingArchive: true

          - task: PublishBuildArtifacts@1
            displayName: 'Publish build artifacts'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'drop'
              publishLocation: 'Container'

  - stage: Deploy
    displayName: 'Deploy to Azure Web App'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployToAzure
        displayName: 'Deploy to Azure Web App'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: NodeTool@0
                  displayName: 'Install Node.js $(nodeVersion)'
                  inputs:
                    versionSpec: '$(nodeVersion)'

                - task: AzureWebApp@1
                  displayName: 'Deploy to Azure Web App'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    appType: '$(appType)'
                    appName: '$(appName)'
                    resourceGroupName: '$(resourceGroupName)'
                    package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
                    deploymentMethod: 'auto'
                    startUpCommand: 'npm start'

                - task: AzureAppServiceManage@0
                  displayName: 'Restart Azure App Service'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    Action: 'Restart Azure App Service'
                    WebAppName: '$(appName)'
                    ResourceGroupName: '$(resourceGroupName)'


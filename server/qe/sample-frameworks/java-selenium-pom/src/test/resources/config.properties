# ── Application ───────────────────────────────────────────────────────────────
base.url=https://example.com
environment=staging

# ── Browser ───────────────────────────────────────────────────────────────────
browser=chrome
headless=false

# ── Timeouts (seconds) ────────────────────────────────────────────────────────
implicit.wait=10
explicit.wait=15
page.load.timeout=30

# ── Test Credentials (override with CI env vars in production) ────────────────
valid.username=testuser@example.com
valid.password=Test@1234!

# ── Reporting ─────────────────────────────────────────────────────────────────
screenshot.on.failure=true
reports.path=target/reports
screenshots.path=target/screenshots
